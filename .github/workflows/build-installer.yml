name: Build mntpack-installer

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mntpack-installer/**'
      - '.github/workflows/build-installer.yml'
  pull_request:
    paths:
      - 'mntpack-installer/**'
      - '.github/workflows/build-installer.yml'

jobs:
  build-installer:
    name: ${{ matrix.os }}-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            exe_suffix: .exe
          - os: windows-latest
            target: i686-pc-windows-msvc
            exe_suffix: .exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe_suffix: ''
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            exe_suffix: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux x86 toolchain
        if: runner.os == 'Linux' && matrix.target == 'i686-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib libc6-dev-i386 pkg-config libssl-dev:i386
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig" >> "$GITHUB_ENV"
          echo "OPENSSL_LIB_DIR=/usr/lib/i386-linux-gnu" >> "$GITHUB_ENV"
          echo "OPENSSL_INCLUDE_DIR=/usr/include" >> "$GITHUB_ENV"
          echo "OPENSSL_DIR=/usr" >> "$GITHUB_ENV"

      - name: Build mntpack-installer
        run: cargo build --release --manifest-path mntpack-installer/Cargo.toml --target ${{ matrix.target }}

      - name: Stage artifact
        shell: pwsh
        run: |
          $bin = "mntpack-installer${{ matrix.exe_suffix }}"
          $src = Join-Path "mntpack-installer/target/${{ matrix.target }}/release" $bin
          $out = "mntpack-installer-${{ matrix.target }}${{ matrix.exe_suffix }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $src (Join-Path dist $out)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mntpack-installer-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build-installer
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read installer version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -m1 '^version = ' mntpack-installer/Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mntpack-installer-*
          merge-multiple: true
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MINT Package Manager v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-assets/*
